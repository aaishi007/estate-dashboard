<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estate Performance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 1400px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 24px; }
.title {
  font-size: 2rem; font-weight: 700;
  background: linear-gradient(90deg, #60a5fa, #a855f7, #ec4899);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}
.subtitle { color: #94a3b8; font-size: 0.95rem; }
.panel {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 18px;
}
.controls {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
}
.ctrl-group { display: flex; flex-direction: column; }
.ctrl-label {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;
  color: #94a3b8; margin-bottom: 6px; font-weight: 600;
}
select {
  background: #0f172a;
  color: white;
  border: 1px solid #475569;
  border-radius: 6px;
  padding: 10px;
  font-size: 0.9rem;
  outline: none;
  font-family: inherit;
  cursor: pointer;
}
select:focus { border-color: #3b82f6; }
.insights {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 18px;
}
.insight {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 14px;
}
.insight-label {
  font-size: 0.7rem; text-transform: uppercase;
  color: #94a3b8; margin-bottom: 6px;
}
.insight-value { font-size: 1.5rem; font-weight: 700; }
.insight-detail { font-size: 0.7rem; color: #64748b; margin-top: 2px; }
.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
@media (max-width: 1024px) {
  .main-grid { grid-template-columns: 1fr; }
}
.panel-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 14px; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th {
  text-align: left; padding: 8px;
  color: #94a3b8; font-weight: 500;
  border-bottom: 1px solid #475569;
}
th.center { text-align: center; }
td {
  padding: 12px 8px;
  border-bottom: 1px solid #334155;
  text-align: center;
}
td.estate-col { text-align: left; font-weight: 600; }
tr:hover { background: rgba(51, 65, 85, 0.3); }
.wentworth { color: #f59e0b; }
.prod-val { font-weight: 700; font-size: 0.95rem; color: white; }
.rain-val { font-size: 0.7rem; margin-top: 2px; }
.rain-low { color: #fbbf24; }
.rain-moderate { color: #60a5fa; }
.rain-high { color: #3b82f6; }
.rain-very-high { color: #93c5fd; }
.rain-na { color: #475569; }
.no-data { color: #475569; }
.legend {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 12px; font-size: 0.7rem;
}
.legend-item { padding: 3px 8px; border-radius: 4px; }
.chart-wrap { position: relative; height: 380px; width: 100%; }
.corr-info {
  margin-top: 10px; padding: 10px;
  background: #0f172a; border-radius: 6px; font-size: 0.85rem;
}
.green { color: #10b981; }
.red { color: #ef4444; }
.yellow { color: #f59e0b; }
.blue { color: #3b82f6; }
.gray { color: #64748b; }
.footer { text-align: center; font-size: 0.75rem; color: #64748b; margin-top: 18px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 class="title">Estate Performance Dashboard</h1>
    <p class="subtitle">Month-on-Month, Year-on-Year Comparison with Rainfall</p>
  </div>

  <div class="panel">
    <div class="controls">
      <div class="ctrl-group">
        <label class="ctrl-label">Month</label>
        <select id="monthSelect"></select>
      </div>
      <div class="ctrl-group">
        <label class="ctrl-label">Estate</label>
        <select id="estateSelect"></select>
      </div>
      <div class="ctrl-group">
        <label class="ctrl-label">View Mode</label>
        <select id="viewSelect">
          <option value="comparison">Year Comparison (Bar)</option>
          <option value="trends">Year Trends (Line)</option>
          <option value="correlation">Rainfall vs Productivity</option>
        </select>
      </div>
    </div>
  </div>

  <div class="insights" id="insightsContainer"></div>

  <div class="main-grid">
    <div class="panel">
      <h3 class="panel-title" id="tableTitle">Performance Comparison</h3>
      <div id="tableContainer"></div>
      <div class="legend">
        <span class="gray">Rainfall:</span>
        <span class="legend-item rain-low" style="background:#fbbf2422">Low (&lt;5cm)</span>
        <span class="legend-item rain-moderate" style="background:#60a5fa22">Moderate (5-20cm)</span>
        <span class="legend-item rain-high" style="background:#3b82f622">High (20-40cm)</span>
        <span class="legend-item rain-very-high" style="background:#93c5fd22">Very High (&gt;40cm)</span>
      </div>
    </div>

    <div class="panel">
      <h3 class="panel-title" id="chartTitle">Productivity by Year</h3>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      <div id="corrInfo"></div>
    </div>
  </div>

  <div class="footer" id="footer"></div>
</div>

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const YEARS = [2023, 2024, 2025, 2026];
const ESTATES = ['Attikunna','Carolyn','Rousdonmullai','Rockwood','Wentworth','Sussex','Mayfield','Woodbriar'];
const YEAR_COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444'];
const ESTATE_COLORS = {
  'Attikunna':'#10b981','Carolyn':'#3b82f6','Rousdonmullai':'#8b5cf6',
  'Rockwood':'#06b6d4','Wentworth':'#f59e0b','Sussex':'#ec4899',
  'Mayfield':'#ef4444','Woodbriar':'#6b7280'
};

// State
let state = { month: 'January', estate: 'All', view: 'comparison' };
let chartInstance = null;

// Helpers
function getRainCategory(r) {
  if (r === null || r === undefined) return { label: 'N/A', cls: 'rain-na' };
  if (r < 5) return { label: 'Low', cls: 'rain-low' };
  if (r < 20) return { label: 'Moderate', cls: 'rain-moderate' };
  if (r < 40) return { label: 'High', cls: 'rain-high' };
  return { label: 'Very High', cls: 'rain-very-high' };
}

function calcCorrelation(points) {
  if (points.length < 3) return null;
  const n = points.length;
  let sx=0, sy=0, sxy=0, sx2=0, sy2=0;
  points.forEach(p => {
    sx += p.x; sy += p.y;
    sxy += p.x * p.y;
    sx2 += p.x * p.x; sy2 += p.y * p.y;
  });
  const num = n*sxy - sx*sy;
  const den = Math.sqrt((n*sx2 - sx*sx) * (n*sy2 - sy*sy));
  return den === 0 ? 0 : num / den;
}

// Populate dropdowns
function initDropdowns() {
  const m = document.getElementById('monthSelect');
  MONTHS.forEach(month => {
    const opt = document.createElement('option');
    opt.value = month; opt.textContent = month;
    m.appendChild(opt);
  });
  const e = document.getElementById('estateSelect');
  const allOpt = document.createElement('option');
  allOpt.value = 'All'; allOpt.textContent = 'All Estates';
  e.appendChild(allOpt);
  ESTATES.forEach(est => {
    const opt = document.createElement('option');
    opt.value = est; opt.textContent = est;
    e.appendChild(opt);
  });

  m.addEventListener('change', ev => { state.month = ev.target.value; render(); });
  e.addEventListener('change', ev => { state.estate = ev.target.value; render(); });
  document.getElementById('viewSelect').addEventListener('change', ev => { state.view = ev.target.value; render(); });
}

// Render insights cards
function renderInsights() {
  const monthData = ALL_DATA.filter(d => d.month === state.month);
  const wData = monthData.filter(d => d.estate === 'Wentworth').sort((a,b) => a.year - b.year);
  let trend = 'N/A', trendClass = 'gray';
  if (wData.length >= 2) {
    const change = ((wData[wData.length-1].productivity - wData[0].productivity) / wData[0].productivity * 100);
    trend = (change >= 0 ? '+' : '') + change.toFixed(1) + '%';
    trendClass = change < 0 ? 'red' : 'green';
  }
  const yearAvgs = YEARS.map(y => {
    const yd = monthData.filter(d => d.year === y);
    return { year: y, avg: yd.length ? yd.reduce((s,d) => s+d.productivity, 0)/yd.length : 0 };
  }).filter(y => y.avg > 0).sort((a,b) => b.avg - a.avg);
  const bestYear = yearAvgs[0];

  // Correlation across all estates for this month
  const corrPoints = monthData.filter(d => d.rainfall !== null).map(d => ({ x: d.rainfall, y: d.productivity }));
  const corr = calcCorrelation(corrPoints);
  let corrLabel = 'N/A', corrClass = 'gray', corrStrength = '';
  if (corr !== null) {
    corrLabel = corr.toFixed(3);
    const a = Math.abs(corr);
    if (a > 0.7) { corrStrength = 'Strong'; corrClass = 'yellow'; }
    else if (a > 0.4) { corrStrength = 'Moderate'; corrClass = 'yellow'; }
    else { corrStrength = 'Weak'; corrClass = 'blue'; }
  }

  document.getElementById('insightsContainer').innerHTML =
    '<div class="insight"><div class="insight-label">Selected Month</div>' +
    '<div class="insight-value">' + state.month + '</div>' +
    '<div class="insight-detail">' + monthData.length + ' records</div></div>' +
    '<div class="insight"><div class="insight-label">Best Year (' + state.month + ')</div>' +
    '<div class="insight-value green">' + (bestYear ? bestYear.year : 'N/A') + '</div>' +
    '<div class="insight-detail">' + (bestYear ? bestYear.avg.toFixed(1) + ' MT/ha avg' : '') + '</div></div>' +
    '<div class="insight"><div class="insight-label">Wentworth Trend</div>' +
    '<div class="insight-value ' + trendClass + '">' + trend + '</div>' +
    '<div class="insight-detail">2023 → 2026 change</div></div>' +
    '<div class="insight"><div class="insight-label">Rain Correlation</div>' +
    '<div class="insight-value ' + corrClass + '">' + corrLabel + '</div>' +
    '<div class="insight-detail">' + corrStrength + '</div></div>';
}

// Render comparison table
function renderTable() {
  const monthData = ALL_DATA.filter(d => d.month === state.month);
  const estatesToShow = state.estate === 'All' ? ESTATES : [state.estate];

  const rows = estatesToShow.map(est => {
    const cells = YEARS.map(y => {
      const rec = monthData.find(d => d.estate === est && d.year === y);
      return { year: y, prod: rec ? rec.productivity : null, rain: rec ? rec.rainfall : null };
    });
    const valid = cells.filter(c => c.prod !== null);
    const avg = valid.length ? valid.reduce((s,c) => s+c.prod, 0)/valid.length : 0;
    return { estate: est, cells, avg };
  }).sort((a, b) => b.avg - a.avg);

  document.getElementById('tableTitle').textContent = state.month + ' Performance Comparison';

  let html = '<table><thead><tr><th>Estate</th>';
  YEARS.forEach(y => html += '<th class="center">' + y + '</th>');
  html += '</tr></thead><tbody>';

  rows.forEach(row => {
    const wClass = row.estate === 'Wentworth' ? 'wentworth' : '';
    html += '<tr><td class="estate-col"><span class="' + wClass + '">' + row.estate + '</span></td>';
    row.cells.forEach(c => {
      if (c.prod !== null) {
        const cat = getRainCategory(c.rain);
        html += '<td><div class="prod-val">' + c.prod + '</div>';
        if (c.rain !== null) {
          html += '<div class="rain-val ' + cat.cls + '">' + c.rain.toFixed(1) + ' cm</div>';
        }
        html += '</td>';
      } else {
        html += '<td><span class="no-data">—</span></td>';
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('tableContainer').innerHTML = html;
}

// Render chart
function renderChart() {
  if (chartInstance) {
    chartInstance.destroy();
    chartInstance = null;
  }
  const ctx = document.getElementById('mainChart').getContext('2d');
  const titleEl = document.getElementById('chartTitle');
  const corrInfoEl = document.getElementById('corrInfo');
  corrInfoEl.innerHTML = '';

  Chart.defaults.color = '#94a3b8';
  Chart.defaults.borderColor = '#334155';

  if (state.view === 'comparison') {
    titleEl.textContent = state.month + ' Productivity by Year';
    const monthData = ALL_DATA.filter(d => d.month === state.month);
    const estatesToShow = state.estate === 'All' ? ESTATES : [state.estate];
    const labels = estatesToShow;
    const datasets = YEARS.map((y, i) => ({
      label: String(y),
      data: estatesToShow.map(est => {
        const rec = monthData.find(d => d.estate === est && d.year === y);
        return rec ? rec.productivity : null;
      }),
      backgroundColor: YEAR_COLORS[i],
      borderRadius: 4
    }));
    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#e2e8f0' } },
          tooltip: { backgroundColor: '#0f172a', borderColor: '#334155', borderWidth: 1 }
        },
        scales: {
          x: { ticks: { color: '#94a3b8' }, grid: { color: '#33415544' } },
          y: { ticks: { color: '#94a3b8' }, grid: { color: '#33415544' }, title: { display: true, text: 'MT/ha', color: '#94a3b8' } }
        }
      }
    });
  } else if (state.view === 'trends') {
    const focusEstate = state.estate === 'All' ? 'Wentworth' : state.estate;
    titleEl.textContent = focusEstate + ' - Year Trends Across All Months';
    const datasets = YEARS.map((y, i) => ({
      label: String(y),
      data: MONTHS.map(month => {
        const rec = ALL_DATA.find(d => d.estate === focusEstate && d.month === month && d.year === y);
        return rec ? rec.productivity : null;
      }),
      borderColor: YEAR_COLORS[i],
      backgroundColor: YEAR_COLORS[i] + '33',
      tension: 0.2,
      spanGaps: true,
      pointRadius: 4
    }));
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: { labels: MONTHS.map(m => m.slice(0,3)), datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#e2e8f0' } },
          tooltip: { backgroundColor: '#0f172a', borderColor: '#334155', borderWidth: 1 }
        },
        scales: {
          x: { ticks: { color: '#94a3b8' }, grid: { color: '#33415544' } },
          y: { ticks: { color: '#94a3b8' }, grid: { color: '#33415544' }, title: { display: true, text: 'MT/ha', color: '#94a3b8' } }
        }
      }
    });
  } else {
    titleEl.textContent = 'Rainfall vs Productivity (' + state.month + ')';
    const monthData = ALL_DATA.filter(d => d.month === state.month && d.rainfall !== null);
    const filtered = state.estate === 'All' ? monthData : monthData.filter(d => d.estate === state.estate);

    // Group by estate so each gets its own color
    const byEstate = {};
    filtered.forEach(d => {
      if (!byEstate[d.estate]) byEstate[d.estate] = [];
      byEstate[d.estate].push({ x: d.rainfall, y: d.productivity, year: d.year, estate: d.estate });
    });

    const datasets = Object.keys(byEstate).map(est => ({
      label: est,
      data: byEstate[est],
      backgroundColor: ESTATE_COLORS[est] || '#8b5cf6',
      pointRadius: 6,
      pointHoverRadius: 8
    }));

    chartInstance = new Chart(ctx, {
      type: 'scatter',
      data: { datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#e2e8f0' } },
          tooltip: {
            backgroundColor: '#0f172a', borderColor: '#334155', borderWidth: 1,
            callbacks: {
              label: function(ctx) {
                const d = ctx.raw;
                return d.estate + ' ' + d.year + ': ' + d.y + ' MT/ha @ ' + d.x.toFixed(1) + ' cm';
              }
            }
          }
        },
        scales: {
          x: { ticks: { color: '#94a3b8' }, grid: { color: '#33415544' }, title: { display: true, text: 'Rainfall (cm)', color: '#94a3b8' } },
          y: { ticks: { color: '#94a3b8' }, grid: { color: '#33415544' }, title: { display: true, text: 'Productivity (MT/ha)', color: '#94a3b8' } }
        }
      }
    });

    const allPoints = filtered.map(d => ({ x: d.rainfall, y: d.productivity }));
    const corr = calcCorrelation(allPoints);
    if (corr !== null) {
      const a = Math.abs(corr);
      const strength = a > 0.7 ? 'Strong' : a > 0.4 ? 'Moderate' : 'Weak';
      const dir = corr > 0 ? 'positive' : 'negative';
      const cls = a > 0.4 ? 'yellow' : 'blue';
      corrInfoEl.innerHTML = '<div class="corr-info"><span class="gray">Correlation: </span><strong class="' + cls + '">' + corr.toFixed(3) + '</strong> <span class="gray">(' + strength + ' ' + dir + ', n=' + allPoints.length + ')</span></div>';
    }
  }
}

function render() {
  renderInsights();
  renderTable();
  renderChart();
}

// Init
initDropdowns();
document.getElementById('footer').textContent = 'Data: ' + ALL_DATA.length + ' records across ' + ESTATES.length + ' estates, ' + YEARS.length + ' years (2023-2026)';
render();
</script>
</body>
</html>
